<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adoção de Cães</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <h2>ONG Patinhas</h2>

    <main>
        <div class="container">


            <form id="formularioAdocao">
                <input type="text" id="nome" placeholder="Nome Completo" required><br>
                <input type="email" id="email" placeholder="Email" required><br>
                <input type="text" id="telefone" placeholder="Telefone" required><br>
                <input type="text" id="cpf" placeholder="CPF" required><br>
                <input type="number" id="idade" placeholder="Idade" required><br>
                <input type="text" id="cidade" placeholder="Cidade" required><br>

                <label>Você possui quintal?</label>
                <select id="quintal" required>
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select><br>

                <label>Moradia:</label>
                <select id="moradia" required>
                    <option value="">Selecione</option>
                    <option value="casa">Casa</option>
                    <option value="apartamento">Apartamento</option>
                </select><br>

                <label>Você já teve pet?</label>
                <select id="pet" required>
                    <option value="">Selecione</option>
                    <option value="sim">Sim</option>
                    <option value="nao">Não</option>
                </select><br>

                <input type="number" id="horas" placeholder="Quantas horas o animal ficará sozinho por dia?"
                    required><br>
                <textarea id="motivo" placeholder="Motivo da adoção"></textarea><br>

                <label>
                    <input type="checkbox" id="termo"> Aceito os termos
                </label><br>

                <button type="submit">Enviar</button>

            </form>

        </div>
    </main>


</body>

</html>
